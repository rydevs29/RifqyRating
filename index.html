<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RifqyMetrics - Project Portfolio & Ratings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fcfcfc; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .project-card:hover { transform: translateY(-5px); transition: all 0.3s ease; }
    </style>
</head>
<body class="text-slate-900">

    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-100">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tight text-blue-600">RifqyMetrics</h1>
            <a href="admin.html" class="text-sm font-medium text-slate-500 hover:text-blue-600 transition">Admin Access</a>
        </div>
    </nav>

    <header class="max-w-6xl mx-auto px-6 py-16 text-center lg:text-left lg:py-24">
        <h2 class="text-4xl md:text-5xl font-extrabold tracking-tight mb-4">
            Eksplorasi Proyek & <span class="text-blue-600">Metrik Kualitas.</span>
        </h2>
        <p class="text-lg text-slate-500 max-w-2xl">
            Daftar repository terpilih dengan sistem penilaian transparan dari komunitas.
        </p>
    </header>

    <main class="max-w-6xl mx-auto px-6 pb-24">
        <div id="project-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="col-span-full text-center py-20 text-slate-400">
                Memuat data proyek...
            </div>
        </div>
    </main>

    <div id="review-modal" class="fixed inset-0 z-[60] hidden flex items-center justify-center p-4 bg-slate-900/50 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl p-8">
            <h3 id="modal-project-name" class="text-2xl font-bold mb-2">Kasih Rating</h3>
            <p class="text-sm text-slate-500 mb-6">Berikan masukan kamu untuk proyek ini.</p>
            
            <form id="review-form" class="space-y-4">
                <input type="hidden" id="modal-project-id">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Nama Kamu</label>
                    <input type="text" id="reviewer-name" required class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="Contoh: RifqyDev">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Rating</label>
                    <select id="reviewer-rating" class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                        <option value="5">⭐⭐⭐⭐⭐ (Sangat Bagus)</option>
                        <option value="4">⭐⭐⭐⭐ (Bagus)</option>
                        <option value="3">⭐⭐⭐ (Cukup)</option>
                        <option value="2">⭐⭐ (Perlu Perbaikan)</option>
                        <option value="1">⭐ (Buruk)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Komentar</label>
                    <textarea id="reviewer-comment" required rows="3" class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="Apa pendapatmu?"></textarea>
                </div>
                <div class="flex gap-3 pt-2">
                    <button type="button" onclick="closeModal()" class="flex-1 px-4 py-2 text-slate-600 font-medium hover:bg-slate-100 rounded-lg transition">Batal</button>
                    <button type="submit" class="flex-1 px-4 py-2 bg-blue-600 text-white font-medium hover:bg-blue-700 rounded-lg shadow-lg shadow-blue-200 transition">Kirim Rating</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
